appId: com.mgruchala.drinkwise.dev
name: Calendar Day Details
tags:
  - navigation
  - day-details
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Today"
    timeout: 10000
- tapOn: "Calendar"
- assertVisible: "Mon"
- tapOn:
    text: "Open details for .*"
- assertVisible: "Drinks"
- assertVisible: ".*of .* units, .* percent of daily limit.*"
- assertNotVisible: "Calendar"
- takeScreenshot: calendar-day-details-design
- tapOn: "Navigate back"
- assertVisible: "Calendar"
- assertVisible: "Mon"
