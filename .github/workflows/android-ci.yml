name: Android CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    name: Fast checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Run unit tests, lint, and debug build
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug --continue

      - name: Upload verification reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-verification-reports
          if-no-files-found: ignore
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
            alcohol-database/build/reports/tests/
            alcohol-database/build/reports/lint-results-*.html
            alcohol-database/build/reports/lint-results-*.xml
            user-preferences/build/reports/tests/
            user-preferences/build/reports/lint-results-*.html
            user-preferences/build/reports/lint-results-*.xml
